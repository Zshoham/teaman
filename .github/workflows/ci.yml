name: CI

# `test` runs the typecheck + unit suite + a full prod build on every push/PR.
# `integration` packs the engine as a real tarball and builds the example vault
#   through the installed CLI — the consumer path the in-repo build can't see.
# `e2e` builds the production site and runs the Playwright suite against it.
# `publish` runs only after all three pass, and only on main pushes / version
#   tags — so a release can never ship untested or unpackageable.
#
# Two release channels to the public npm registry:
#   - push to main        -> prerelease  X.Y.Z-dev.g<sha> @ dist-tag `dev`
#   - push tag vX.Y.Z     -> release      X.Y.Z           @ dist-tag `latest`
# The dev version is just the committed package.json version plus the commit's
# short SHA — no guessing the next bump level. Stale main runs skip publishing so
# `@dev` is not repointed backwards when pushes overlap.
# Auth is npm trusted publishing (OIDC) — no token; the trusted publisher for this
# repo+workflow is configured in the npm package settings. Publishes carry build
# provenance automatically.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # astro sync generates .astro/types.d.ts (astro:content module types),
      # which tsconfig includes — a fresh checkout has none until then.
      - run: npm run typecheck
      - run: npm run build:all
      - run: npm test

  # Consumer path: pack the engine, install the tarball into a throwaway project
  # outside the repo, and build the example vault through the installed CLI. Runs
  # its own install of the tarball, so no `npm ci` here — it catches packaging
  # bugs (missing `files`/`dependencies`, unresolvable bin) the in-repo build can't.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm run test:integration

  # Browser suite: the Playwright config's webServer builds the production site
  # and serves it via `astro preview`, then runs the e2e/ specs against it.
  # `npx playwright install --with-deps chromium` pulls the headless browser
  # binary and the system libraries it needs on a clean Ubuntu runner.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  publish:
    needs: [test, integration, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # bundles npm >= 11.5.1, which supports OIDC trusted publishing
          registry-url: https://registry.npmjs.org
      # No npm ci needed: the package ships source (see `files` in package.json),
      # and the `test` job already validated install + build.
      - name: Resolve version and publish
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DIST_TAG=latest
          else
            # Skip if a newer commit already became origin/main, so an overlapping
            # stale run can't repoint @dev backwards.
            git fetch --no-tags --depth=1 origin main
            CURRENT=$(git rev-parse origin/main)
            if [[ "$GITHUB_SHA" != "$CURRENT" ]]; then
              echo "Skipping publish: $GITHUB_SHA is no longer origin/main ($CURRENT)."
              exit 0
            fi
            BASE=$(node -p "require('./package.json').version")
            SHA=$(git rev-parse --short HEAD)
            VERSION="$BASE-dev.g$SHA"
            DIST_TAG=dev
          fi
          echo "Publishing $VERSION (dist-tag: $DIST_TAG)"
          npm version --no-git-tag-version --allow-same-version "$VERSION"
          npm publish --tag "$DIST_TAG"
