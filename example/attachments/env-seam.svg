<?xml version="1.0" encoding="UTF-8"?>
<!-- Theme-aware demo diagram: teaman inlines vault SVGs into the page, so
     currentColor and the var(--…) theme tokens below resolve against the
     site's light/dark theme. The fallbacks keep it readable standalone. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 180" width="660" height="180"
     font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="env-seam-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--muted-foreground, #64748b)"/>
    </marker>
  </defs>

  <!-- vault -->
  <rect x="12" y="52" width="176" height="84" rx="10"
        fill="var(--card, #ffffff)" stroke="var(--border, #d9d9e0)" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" font-size="15" font-weight="600"
        fill="currentColor">vault</text>
  <text x="100" y="112" text-anchor="middle" font-size="12"
        fill="var(--muted-foreground, #64748b)">pure data — content/</text>

  <!-- engine (accented: it is the moving part) -->
  <rect x="242" y="52" width="176" height="84" rx="10"
        fill="var(--card, #ffffff)" stroke="var(--primary, #a4551c)" stroke-width="1.5"/>
  <text x="330" y="88" text-anchor="middle" font-size="15" font-weight="600"
        fill="var(--primary, #a4551c)">engine</text>
  <text x="330" y="112" text-anchor="middle" font-size="12"
        fill="var(--muted-foreground, #64748b)">Astro + Slidev + Pagefind</text>

  <!-- published site -->
  <rect x="472" y="52" width="176" height="84" rx="10"
        fill="var(--card, #ffffff)" stroke="var(--border, #d9d9e0)" stroke-width="1.5"/>
  <text x="560" y="88" text-anchor="middle" font-size="15" font-weight="600"
        fill="currentColor">site</text>
  <text x="560" y="112" text-anchor="middle" font-size="12"
        fill="var(--muted-foreground, #64748b)">static public/</text>

  <!-- flows -->
  <line x1="192" y1="94" x2="235" y2="94" stroke="var(--muted-foreground, #64748b)"
        stroke-width="1.5" marker-end="url(#env-seam-arrow)"/>
  <text x="215" y="44" text-anchor="middle" font-size="11"
        fill="var(--muted-foreground, #64748b)">markdown</text>

  <line x1="422" y1="94" x2="465" y2="94" stroke="var(--muted-foreground, #64748b)"
        stroke-width="1.5" marker-end="url(#env-seam-arrow)"/>
  <text x="444" y="44" text-anchor="middle" font-size="11"
        fill="var(--muted-foreground, #64748b)">static HTML</text>
</svg>
