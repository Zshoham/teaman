variables:
  SITE_BASE: "/$CI_PROJECT_NAME/"

stages:
  - build
  - deploy

build:site:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - cd site && npm ci && npm run build:all
  artifacts:
    paths:
      - public/

pages:
  stage: deploy
  needs:
    - build:site
  script:
    - echo "Deploying merged site to GitLab Pages"
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
