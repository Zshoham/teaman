variables:
  SITE_BASE: "/$CI_PROJECT_NAME/"

stages:
  - build
  - search
  - deploy

build:notes:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - cd site && npm ci && npm run build
  artifacts:
    paths:
      - public/

build:slides:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - cd site && npm ci && node scripts/build-slides.mjs
  artifacts:
    paths:
      - public/slides/

build:search:
  stage: search
  image: node:22-alpine
  needs:
    - build:notes
    - build:slides
  script:
    - npx pagefind --site public
  artifacts:
    paths:
      - public/

pages:
  stage: deploy
  needs:
    - build:search
  script:
    - echo "Deploying merged site to GitLab Pages"
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
