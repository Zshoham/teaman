variables:
  SITE_BASE: "/$CI_PROJECT_NAME/"

stages:
  - build
  - search
  - deploy

build:notes:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - cd site && npm ci && npm run build
  artifacts:
    paths:
      - public/

build:slides:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - cd site && npm ci && node scripts/build-slides.mjs
  artifacts:
    paths:
      - public/slides/

build:guides:
  stage: build
  image: node:22-alpine
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - site/node_modules/
  script:
    - apk add --no-cache curl tar
    - curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-musl.tar.gz
        | tar xz -C /usr/local/bin
    - cd site && npm ci && npm run build:guides
  artifacts:
    paths:
      - public/guides/

build:search:
  stage: search
  image: node:22-alpine
  needs:
    - build:notes
    - build:slides
    - build:guides
  script:
    - npx pagefind --site public
  artifacts:
    paths:
      - public/

pages:
  stage: deploy
  needs:
    - build:search
  script:
    - echo "Deploying merged site to GitLab Pages"
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
